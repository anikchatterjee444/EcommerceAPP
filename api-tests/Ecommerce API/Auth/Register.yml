info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/auth/register
  body:
    type: json
    data: |-
      {
        "name": "Anik",
        "email": "anik@example.com",
        "password": "password123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
