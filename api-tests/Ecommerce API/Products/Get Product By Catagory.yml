info:
  name: Get Product By Catagory
  type: http
  seq: 4

http:
  method: GET
  url: http://localhost:3000/products?category=smartphones
  params:
    - name: category
      value: smartphones
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
